{{ define "main" }}
<section class="home">
  <div class="home-intro">
    {{ .Content }}
  </div>
  <div class="entry-list">
    {{ range first 6 (where .Site.RegularPages "Section" "posts") }}
      <article class="entry">
        <div class="entry-meta">{{ .Date.Format "Jan 2, 2006" }}</div>
        <h2 class="entry-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="entry-summary">{{ .Summary | plainify }}</p>
      </article>
    {{ end }}
  </div>
  <div class="home-footer">
    <a class="button" href="{{ "/posts/" | relURL }}">Browse the full archive</a>
  </div>
</section>
{{ end }}
