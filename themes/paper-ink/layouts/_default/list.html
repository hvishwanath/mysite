{{ define "main" }}
<section class="list">
  <h1 class="section-title">{{ .Title }}</h1>
  <div class="entry-list">
    {{ range .Pages }}
      <article class="entry">
        <div class="entry-meta">{{ .Date.Format "Jan 2, 2006" }}</div>
        <h2 class="entry-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="entry-summary">{{ .Summary | plainify }}</p>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
