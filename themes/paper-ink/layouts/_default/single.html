{{ define "main" }}
<article class="post">
  <header class="post-header">
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Params.tags }}
      <ul class="post-tags">
        {{ range . }}
          <li>#{{ . }}</li>
        {{ end }}
      </ul>
    {{ end }}
  </header>
  <div class="post-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
