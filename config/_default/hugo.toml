theme = "blowfish"
baseURL = "https://hvishwanath.net/"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 30
enableEmoji = true

buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 12

[taxonomies]
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
      name = "tags"
      weight = 100

    [[related.indices]]
      name = "date"
      weight = 10
